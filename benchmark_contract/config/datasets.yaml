default_dataset: mpfdataset

datasets:
  flowscape:
    root: /data/FlowScape
    scene: sunny
    split: test
    expected_layout:
      - Flow360/test/sunny/img
      - Flow360/test/sunny/flow
    download:
      provider: google_drive
      file_id: 1cKJZBRprwS6fu6Nf4U0eU6lkqB88tW_v
      url: https://drive.google.com/file/d/1cKJZBRprwS6fu6Nf4U0eU6lkqB88tW_v/view?usp=sharing
      cache_path: /data/downloads/FlowScape.zip
      extract: true
      manual_alternates:
        - https://github.com/MasterHow/PanoFlow#flowscape-flow360-dataset
        - https://drive.google.com/uc?id=1cKJZBRprwS6fu6Nf4U0eU6lkqB88tW_v
    notes: "Default benchmark target. PriOr-RAFT expects root/Flow360/<split>/<scene>/{img,flow}."

  mpfdataset:
    root: /data/MPFDataset
    scene: EFT
    split: test
    expected_layout:
      - EFTs_Car100/image
      - EFTs_Car100/flow
    download:
      provider: manual
      url: https://github.com/HenryLee0314/ECCV2022-MPF-net
      cache_path: /data/downloads/MPFDataset.zip
      extract: true
      manual_alternates:
        - https://github.com/HenryLee0314/ECCV2022-MPF-net
        - https://1drv.ms/f/s!Al4FLTWGYZdrjzOxjBwW_bJUt05T
    notes: "Default fallback benchmark target. Official dataset distribution is a OneDrive folder, so mount/download the archive manually."

  omniphotos:
    root: /data/OmniPhotos
    scene: default
    split: eval
    download:
      provider: manual
      url: https://github.com/cr333/OmniPhotos
      extract: false
    notes: "Qualitative/generalization dataset; not part of default metric reproduction."

  odvista:
    root: /data/ODVista
    scene: default
    split: test
    download:
      provider: manual
      url: https://github.com/Omnidirectional-video-group/ODVista
      extract: false
    notes: "Qualitative/generalization dataset; ODVista is distributed through gsutil."
